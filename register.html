<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — HTRS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SCAN EFFECT -->
<div class="scan-effect"></div>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">HTRS</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<!-- NAVBAR -->
<nav id="navbar">
  <a href="index.html" class="nav-brand">HT<span>RS</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="index.html#squad" class="nav-link">Squad</a>
    <a href="index.html#members" class="nav-link">Members</a>
    <a href="index.html#contact" class="nav-link">Contact</a>
  </div>
  <div class="nav-actions" id="nav-actions"></div>
</nav>

<!-- PAGE -->
<main class="page">
  <div class="auth-page">

    <div class="orb orb-1" style="position:fixed;"></div>
    <div class="orb orb-2" style="position:fixed;"></div>

    <div class="auth-box" style="max-width:460px;">
      <div class="hero-badge" style="text-align:left;margin-bottom:12px;">// NEW RECRUIT ·</div>
      <h2 class="auth-title">Join Squad</h2>
      <p class="auth-sub">Daftarkan diri ke HTRS</p>

      <div class="alert" id="register-alert"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input class="form-input" type="text" id="reg-name" placeholder="Nama lengkap" autocomplete="name" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input class="form-input" type="email" id="reg-email" placeholder="agent@htrs.squad" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Min. 6 karakter" autocomplete="new-password" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input class="form-input" type="password" id="reg-confirm" placeholder="Ulangi password" autocomplete="new-password" required />
        </div>

        <div style="
          background: rgba(0,245,255,0.04);
          border: 1px solid rgba(0,245,255,0.15);
          border-radius: 6px;
          padding: 12px 14px;
          margin-bottom: 20px;
          font-size: 0.82rem;
          color: var(--text-dim);
          font-family: 'Share Tech Mono', monospace;
          letter-spacing: 0.5px;
        ">
          ℹ️ Akun baru akan mendapat role <strong style="color:var(--neon-blue)">member</strong>. 
          Superadmin dapat mengubah role melalui panel admin.
        </div>

        <button type="submit" id="register-btn" class="btn btn-primary" style="width:100%;justify-content:center;">
          ⚡ JOIN THE SQUAD
        </button>
      </form>

      <div class="auth-footer">
        Sudah punya akun? <a href="login.html">Login →</a>
      </div>
    </div>

  </div>
</main>

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>

</body>
</html>
